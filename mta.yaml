_schema-version: "3.1"
ID: ForkQA
version: 1.0.0
description: Forklift Pre-Operation Inspection App

parameters:
  enable-parallel-deployments: true

modules:
  - name: ForkQA-db
    type: hdb
    path: db
    parameters:
      buildpack: nodejs_buildpack
    build-parameters:
      builder: custom
      commands:
        - npm run build
    requires:
      - name: ForkQA-hdi-container

  - name: ForkQA-srv
    type: nodejs
    path: srv
    parameters:
      buildpack: nodejs_buildpack
      memory: 256M
      disk-quota: 1024M
    build-parameters:
      builder: npm
    provides:
      - name: srv-api
        properties:
          srv-url: ${default-url}
    requires:
      - name: ForkQA-hdi-container

resources:
  - name: ForkQA-hdi-container
    type: com.sap.xs.hdi-container
    parameters:
      service: hana
      service-plan: hdi-shared
    properties:
      hdi-service-name: ${service-name}
